    <style>
      /* Loading Screen Styles */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1e3a8a, #7c3aed, #1e3a8a);
        background-size: 200% 200%;
        animation: gradient-shift 3s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      .loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loading-content {
        text-align: center;
        color: white;
      }

      .loading-logo {
        font-size: 4rem;
        font-weight: bold;
        background: linear-gradient(45deg, #60a5fa, #a78bfa, #34d399);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 2rem;
        animation: pulse-glow 2s ease-in-out infinite;
      }

      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid #60a5fa;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      .loading-text {
        margin-top: 1rem;
        font-size: 1.2rem;
        opacity: 0.8;
        animation: fade-pulse 2s ease-in-out infinite;
      }

      @keyframes gradient-shift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }

      @keyframes pulse-glow {
        0%, 100% { 
          text-shadow: 0 0 20px rgba(96, 165, 250, 0.8);
          transform: scale(1);
        }
        50% { 
          text-shadow: 0 0 40px rgba(96, 165, 250, 1), 0 0 60px rgba(167, 139, 250, 0.8);
          transform: scale(1.05);
        }
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes fade-pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <div class="loading-logo">VIENTO</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Experience the Wind of Style...</div>
      </div>
    </div>

    <div id="root"></div>
    
    <!-- Loading Script -->
    <script>
      // Show loading screen and hide after page load
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(function() {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1500); // Show loading for at least 1.5 seconds
      });

      // Smooth scroll implementation
      document.addEventListener('DOMContentLoaded', function() {
        // Add smooth scrolling to all anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
          anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
              target.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
              });
            }
          });
        });

        // Scroll reveal animation
        const observerOptions = {
          threshold: 0.1,
          rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('in-view');
            }
          });
        }, observerOptions);

        // Observe elements with scroll animation
        document.querySelectorAll('.animate-on-scroll').forEach(el => {
          observer.observe(el);
        });
      });
    </script>

  </body>
